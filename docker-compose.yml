version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: coupon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coupon_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: coupon_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DOCKER_ENV: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: coupon_marketplace
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RESELLER_TOKEN: ${RESELLER_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: coupon_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data: